<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lord_Registro</title>
    <link rel="stylesheet" href="CSS/style1.css">
</head>

<body>

    <header class="header">
        <a href="index.html" class="logo_lord">
            
            <img src="Imagenes/logolord.png"  alt="Logo Lord" class="logo">

        </a>
        <nav class="nav">
            <a href="index1.html">Iniciar</a>
            <a href="index2.html">Registrarme</a>
            <a href="index3.html">Información</a>
        </nav>
    </header> 

    <main>
        <div class="form-container">
            <h2>Registrarse en LORD</h2>
            <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Nombre de usuario:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirmar contraseña:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <button type="submit" class="submit-btn"><a href="index4.html">Crear Cuenta</a></button>
            </form>
            <p class="login-link" >¿Ya tienes una cuenta? <a href="index1.html">Iniciar Sesión</a></p>
        </div>
    </main>

    <footer class="footer">
    <p><strong>LORD</strong> — Organiza tu hogar</p>

</body>
